  nakama:
    container_name: nakama
    build: ./backend
    restart: always
    environment:
      - NAKAMA_DATABASE_URL=${NAKAMA_DATABASE_URL}
      - NAKAMA_LOGGER_LEVEL=${NAKAMA_LOGGER_LEVEL:-DEBUG}
      - NAKAMA_SERVER_KEY=${NAKAMA_SERVER_KEY:-defaultkey}
      - NAKAMA_SESSION_KEY=${NAKAMA_SESSION_KEY:-default-encryption-key}
      - CORS_ORIGINS=${NETLIFY_URL:-*}
    expose:
      - "7349"
      - "7350"
      - "7351"
    ports:
      - "7349:7349"
      - "7350:7350"
      - "7351:7351"

volumes:
  postgres-data:
