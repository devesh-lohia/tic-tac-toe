name: "nakama-node-1"
data_dir: "/nakama/data"

logger:
  level: "${NAKAMA_LOGGER_LEVEL:-DEBUG}"
  stdout: true

console:
  port: 7351
  username: "${NAKAMA_CONSOLE_USERNAME}"
  password: "${NAKAMA_CONSOLE_PASSWORD}"
  cors_allowed_origins: ["${CORS_ORIGINS}"]

socket:
  port: 7350
  cors_allowed_origins: ["${CORS_ORIGINS}"]

session:
  encryption_key: "${NAKAMA_SESSION_KEY:-default-encryption-key}"
  token_expiry_sec: 3600

runtime:
  js_entrypoint: "main.js"
  http_key: "${NAKAMA_SERVER_KEY:-defaultkey}"
